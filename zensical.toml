# 01-JUL-2026
# Zensical Documentation:
# https://zensical.org/docs/
# Zensical >= 0.0.40
[project]
validation = true
dev_addr = "localhost:8000"

site_name = "MVHS Workshop Python für Automatisierungs- und Scripting-Aufgaben"
site_description = "Meine Daten aus dem MVHS Workshop Python für Automatisierungs- und Scripting-Aufgaben"
site_author = "Manfred Rosenboom (maroph)"
site_url = "https://maroph.github.io/mvhs_python_automatisierung_scripting/"

docs_dir = "docs"
site_dir = "site"
use_directory_urls = false

repo_url = "https://github.com/maroph/mvhs_python_automatisierung_scripting"
repo_name = "maroph/mvhs_python_automatisierung_scripting"
edit_uri = "edit/main/docs/"

copyright = """
Copyright &copy 2025-2026 <a href="https://creativecommons.org/licenses/by/4.0/">CC-BY 4.0</a> by <a href="https://maroph.github.io/">Manfred Rosenboom</a><br/>
<a href="#__consent">Change cookie settings</a>
"""

nav = [
  { "Home" = "index.md" },
  { "Workshop" = [
    { "Workshop" = "workshop.md" },
    { "Links" = "workshop/links.md" },
    { "Tag 1" = "workshop/tag1.md" },
    { "Tag 2" = "workshop/tag2.md" },
    { "Tag 3" = "workshop/tag3.md" },
    { "Schlusswort" = "workshop/summary.md" }
  ]},
  { "Python" = [
    { "Python" = "python.md" },
    { "Links" = "python/links.md" },
    { "Dictionaries" = "python/dictionaries.md" },
    { "Funktionsargumente" = "python/func_args.md" },
    { "Hashable" = "python/hashable.md" },
    { "Listen" = "python/listen.md" },
    { "Sets" = "python/sets.md" },
    { "SQLite" = "python/sqlite.md" },
    { "Tuples" = "python/tuples.md" }
  ]},
  { "Info" = [
    { "Info" = "info.md" },
    { "Über" = "info/about.md" },
    { "Lizenz" = "info/license.md" },
    { "DSGVO" = "info/gdpr.md" },
    { "Quellen" = "info/sources.md" },
  ]}
]

[project.theme]
favicon = "assets/favicon.ico"
logo = "assets/python-logo-only2.png"
language = "en"
direction = "ltr"
features = [
    "announce.dismiss",
    "content.action.edit",
    "content.action.view",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "header.autohide",
    "navigation.expand",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.prune",
    "navigation.sections",
    "navigation.tabs",
    "navigation.tabs.sticky",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
    "toc.follow"
]

palette = [
  {
    scheme = "default",
    toggle = {
      icon = "lucide/sun",
      name = "Switch to dark mode"
    }
  },
  {
    scheme = "slate",
    toggle = {
      icon = "lucide/moon",
      name = "Switch to light mode"
    }
  }
]


[project.theme.font]
font = false

[project.theme.icon]
# logo = "lucide/smile"
repo = "fontawesome/brands/github"
edit = "material/pencil"
view = "material/eye"
previous = "fontawesome/solid/angle-left"
next = "fontawesome/solid/angle-right"


[project.markdown_extensions.attr_list]

[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = "true"
line_spans = "__span"
pygments_lang_class = "true"

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.snippets]

[project.markdown_extensions.pymdownx.superfences]

[project.markdown_extensions.tables]


[project.plugins.offline]
enabled = false

[project.extra]
social = [
    {
        icon = "fontawesome/brands/github",
        link = "https://github.com/maroph",
        name = "github.com/maroph"
    },
    {
        icon = "fontawesome/brands/mastodon",
        link = "https://mastodon.social/@maroph",
        name = "mastodon.social/@maroph"
    }
]

[project.extra.consent]
title = "Cookie consent"
description = """
    We use cookies to recognize your repeated visits and preferences, as well
    as to measure the effectiveness of our documentation and whether users
    find what they're searching for. With your consent, you're helping us to
    make our documentation better.
"""
actions = [
    "accept",
    "reject",
    "manage"
]
